workflows:
  lokally-passenger-ios-testflight:
    name: Lokally Passenger iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Lokally

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - profile: lokally_passageiro_app_store_profile
            environment_variable: LOKALLY_PASSAGEIRO_PROFILE_PATH
        certificates:
          - certificate: lokally_ios_distribution_certificate
            environment_variable: LOKALLY_IOS_CERTIFICATE_PATH
      vars:
        BUNDLE_ID: "com.lokallyapp.passageiro"

    scripts:
      - name: Diagnose iOS project
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          echo "---- iOS project files ----"
          find ios -maxdepth 5 \( -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "*.xcscheme" \) -print
          echo "---- Runner scheme ----"
          cat ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme
          echo "---- Signing files ----"
          echo "Profile path: $LOKALLY_PASSAGEIRO_PROFILE_PATH"
          echo "Certificate path: $LOKALLY_IOS_CERTIFICATE_PATH"
          ls -lah "$HOME/Library/MobileDevice/Provisioning Profiles" || true
          ls -lah "$HOME/Library/MobileDevice/Certificates" || true

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --profile "$LOKALLY_PASSAGEIRO_PROFILE_PATH" \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'

      - name: Build signed iOS IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false