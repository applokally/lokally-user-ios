workflows:
  lokally-passenger-ios-testflight:
    name: Lokally Passenger iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Lokally

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - profile: lokally_passageiro_app_store_profile
            environment_variable: LOKALLY_PASSAGEIRO_PROFILE_PATH
        certificates:
          - certificate: lokally_ios_distribution_certificate
            environment_variable: LOKALLY_IOS_CERTIFICATE_PATH
      vars:
        BUNDLE_ID: "com.lokallyapp.passageiro"

    scripts:
      - name: Diagnose iOS project
        script: |
          set -e
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          echo "---- iOS project files ----"
          find ios -maxdepth 5 \( -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "*.xcscheme" \) -print
          echo "---- Runner scheme ----"
          cat ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme
          echo "---- Signing files ----"
          echo "Profile path: $LOKALLY_PASSAGEIRO_PROFILE_PATH"
          echo "Certificate path: $LOKALLY_IOS_CERTIFICATE_PATH"

      - name: Get Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod install
          cd ..

      - name: Configure manual iOS signing
        script: |
          set -e

          PROFILE_PLIST="/tmp/lokally_profile.plist"
          security cms -D -i "$LOKALLY_PASSAGEIRO_PROFILE_PATH" > "$PROFILE_PLIST"

          export PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          export PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          export PROFILE_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$PROFILE_PLIST")

          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"
          echo "Profile Team ID: $PROFILE_TEAM_ID"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$LOKALLY_PASSAGEIRO_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          project_file = Path("ios/Runner.xcodeproj/project.pbxproj")
          content = project_file.read_text()

          team_id = os.environ["PROFILE_TEAM_ID"]
          profile_name = os.environ["PROFILE_NAME"]

          content = re.sub(
              r"DEVELOPMENT_TEAM = [A-Z0-9]+;",
              f"DEVELOPMENT_TEAM = {team_id};",
              content,
          )

          content = content.replace(
              "CODE_SIGN_STYLE = Automatic;",
              "CODE_SIGN_STYLE = Manual;",
          )

          content = re.sub(
              r'PROVISIONING_PROFILE_SPECIFIER = "[^"]*";',
              f'PROVISIONING_PROFILE_SPECIFIER = "{profile_name}";',
              content,
          )

          project_file.write_text(content)
          PY

          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$PROFILE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.lokallyapp.passageiro</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          echo "---- Export options ----"
          cat /Users/builder/export_options.plist

      - name: Build signed iOS IPA
        script: |
          set -e
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false